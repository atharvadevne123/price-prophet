name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Bump version in pyproject.toml
        id: version
        run: |
          pip install -q tomli tomli-w
          python - <<'PYEOF'
          import tomllib, tomli_w, os
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          v = data["project"]["version"]
          major, minor, patch = map(int, v.split("."))
          bump = os.environ["BUMP"]
          if bump == "major":   major += 1; minor = 0; patch = 0
          elif bump == "minor": minor += 1; patch = 0
          else:                 patch += 1
          new_v = f"{major}.{minor}.{patch}"
          data["project"]["version"] = new_v
          with open("pyproject.toml", "wb") as f:
              tomli_w.dump(data, f)
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"version={new_v}\n")
          PYEOF
        env:
          BUMP: ${{ inputs.bump }}

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push && git push --tags

      - name: Create GitHub Release
        run: gh release create "v${{ steps.version.outputs.version }}" --generate-notes --title "v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
