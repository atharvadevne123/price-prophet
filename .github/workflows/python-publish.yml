name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: pip install build twine
      - name: Build package
        run: python -m build
      - name: Publish to GitHub Packages
        run: |
          twine upload \
            --repository-url https://pypi.pkg.github.com/atharvadevne123/ \
            --username __token__ \
            --password ${{ secrets.GITHUB_TOKEN }} \
            dist/*
