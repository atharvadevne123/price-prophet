version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prophet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prophetpass}
      POSTGRES_DB: ${POSTGRES_DB:-price_prophet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prophet"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: price-prophet-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-prophet}:${POSTGRES_PASSWORD:-prophetpass}@db:5432/${POSTGRES_DB:-price_prophet}
      MODEL_PATH: /data/model.joblib
      METRICS_PATH: /data/metrics.json
      REFERENCE_STATS_PATH: /data/reference_stats.json
      FAISS_INDEX_PATH: /data/faiss_index.pkl
    volumes:
      - model_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  model_data:
